<!doctype html>
<html lang="ja"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#08170f"><meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./manifest.webmanifest"><link rel="apple-touch-icon" href="./icon-192.png">
<title>いきものマスター Ver7.3</title>
<style>
:root{--bg:#06130c;--panel:#0f2d1d;--panel2:#17452b;--line:#416e4b;--gold:#f2cc4b;--ink:#f8fff8;--sub:#b7cdbb;--red:#ff735f}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:radial-gradient(circle at 50% -8%,#26683f 0,transparent 35%),linear-gradient(#0d281a,#06130c 66%);color:var(--ink)}button,input,select,textarea{font:inherit}button{cursor:pointer}
header{text-align:center;padding:calc(15px + env(safe-area-inset-top)) 14px 10px}header h1{margin:0;font-size:29px}.tag{display:inline-block;margin-top:5px;padding:4px 11px;border-radius:999px;background:#493d0d;color:#ffe37c;font-weight:900;font-size:12px}
main{max-width:920px;margin:auto;padding:0 12px calc(96px + env(safe-area-inset-bottom))}.panel{display:none}.panel.active{display:block}.box{background:linear-gradient(145deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:22px;padding:14px;margin-bottom:12px;box-shadow:0 14px 34px #0006}
.bottom{position:fixed;z-index:20;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(5,1fr);padding:7px 7px calc(7px + env(safe-area-inset-bottom));background:#03100aeF;border-top:1px solid #315b3d;backdrop-filter:blur(12px)}.bottom button{border:0;background:transparent;color:#a9c2ae;font-size:10px;font-weight:900;padding:6px 0}.bottom i{display:block;font-style:normal;font-size:24px}.bottom .active{color:var(--gold)}
.btn{border:0;border-radius:14px;padding:13px;font-weight:950}.primary{background:var(--gold);color:#172014}.secondary{background:#275a38;color:#fff;border:1px solid #4e805c}.ghost{background:#0b2417;color:#fff;border:1px solid var(--line)}.full{width:100%}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.hero{text-align:center}.egg{font-size:105px;filter:drop-shadow(0 16px 20px #0007)}.progress{height:12px;background:#06180e;border:1px solid var(--line);border-radius:99px;overflow:hidden}.progress i{display:block;height:100%;background:linear-gradient(90deg,#60d36b,var(--gold));width:0}
.stats{display:flex;gap:18px;flex-wrap:wrap;color:var(--sub);margin-bottom:9px}.toolbar{display:grid;grid-template-columns:1fr 115px;gap:8px;margin-bottom:10px}input,select,textarea{width:100%;padding:12px;border-radius:13px;border:1px solid #52765d;background:#071c11;color:white}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.slot{position:relative;min-width:0;border:1px solid #7a6b28;border-radius:18px;overflow:hidden;background:#0c2618;box-shadow:0 8px 22px #0004}.slot .no{position:absolute;z-index:2;top:8px;left:9px;font-weight:900;text-shadow:0 2px 4px #000}.photo{height:155px;display:grid;place-items:center;background:radial-gradient(circle,#295a38,#08170f);overflow:hidden}.photo img{width:100%;height:100%;object-fit:cover}.locked .photo img{filter:brightness(.28) saturate(.7)}.fallback{font-size:60px;filter:brightness(.42)}.slotbody{padding:10px}.slotbody h3{margin:0;font-size:18px}.small{font-size:12px;color:var(--sub)}.lock{display:inline-block;margin-top:6px;padding:3px 8px;border-radius:999px;background:#171707;color:#ffd95a;font-size:11px;font-weight:900}
.cardface{position:relative;min-height:230px;padding:9px;border:3px solid var(--rar);background:linear-gradient(145deg,var(--bg1),var(--bg2));box-shadow:inset 0 0 30px #fff2,0 0 18px color-mix(in srgb,var(--rar) 50%,transparent);display:flex;flex-direction:column;justify-content:space-between}.rank{font-size:26px;font-weight:1000;color:var(--rar);text-shadow:0 2px 3px #000}.art{height:135px;display:grid;place-items:center;font-size:72px;filter:drop-shadow(0 10px 9px #0007)}.cardname{text-align:center;font-weight:1000;font-size:18px;padding:5px;background:#0006;border:1px solid #fff3}.cardmeta{font-size:11px;display:flex;justify-content:space-between}.stars{color:#ffe15a;letter-spacing:1px}
.photoBox{height:260px;border:2px dashed #6e9b79;border-radius:18px;display:grid;place-items:center;overflow:hidden;background:#071d11;color:var(--sub)}.photoBox img{width:100%;height:100%;object-fit:cover}.filebtn{position:relative;overflow:hidden}.filebtn input{position:absolute;inset:0;opacity:0}.ai{margin-top:10px;padding:12px;border-radius:15px;background:#372f12;border:1px solid #8b7728}.candidate{width:100%;text-align:left;margin-top:7px;padding:10px;border-radius:12px;border:1px solid #54705c;background:#102b1c;color:#fff}
.modal{display:none;position:fixed;z-index:40;inset:0;background:#000c;padding:18px;place-items:center}.modal.show{display:grid}.modalcard{position:relative;width:min(470px,100%);max-height:92vh;overflow:auto;background:linear-gradient(#173c27,#091d12);border:1px solid #54775c;border-radius:22px;padding:16px}.close{position:absolute;right:10px;top:8px;width:38px;height:38px;border-radius:50%;border:1px solid #66816d;background:#081b10;color:#fff;font-size:22px}
.detailgrid{display:grid;grid-template-columns:145px 1fr;gap:12px}.detailgrid .cardface{min-height:250px}.detail h4{margin:9px 0 2px;color:var(--gold)}.tabs{display:flex;gap:6px;margin:10px 0}.tabs button{flex:1}
.friend{display:grid;grid-template-columns:64px 1fr 88px;gap:10px;align-items:center;padding:10px;border-bottom:1px solid #41684a}.avatar{font-size:42px}.friend .mini{height:112px}.friend .mini .art{height:55px;font-size:36px}.friend .mini .cardname{font-size:10px}.friend .mini .rank{font-size:15px}
.toast{display:none;position:fixed;z-index:60;left:50%;bottom:105px;transform:translateX(-50%);background:#000d;border:1px solid var(--gold);padding:12px 18px;border-radius:99px;font-weight:900}.toast.show{display:block}
.getfx{display:none;position:fixed;z-index:55;inset:0;background:#000d;place-items:center;text-align:center}.getfx.show{display:grid}.getfx h2{font-size:42px;color:var(--gold);text-shadow:0 0 18px #ffd34d}.getfx .cardface{width:230px;animation:pop .65s}@keyframes pop{0%{transform:scale(.2) rotateY(180deg)}100%{transform:scale(1)}}
@media(max-width:430px){.detailgrid{grid-template-columns:1fr}.detailgrid>.cardface{width:210px;margin:auto}.photo{height:145px}.cardface{min-height:220px}.art{height:120px}}
</style></head><body>
<header><h1>🌿 いきものマスター</h1><div class="tag">Ver7.3 開発版</div></header>
<main>
<section id="home" class="panel active">
 <div class="box hero"><div id="spiritArt" class="egg">🥚</div><h2 id="spiritTitle">不思議な卵</h2><p id="spiritSub" class="small">3種類見つけると羽化するよ</p><div class="progress"><i id="spiritBar"></i></div></div>
 <div class="row"><button class="btn primary" onclick="showPanel('discover')">📷 新しい発見</button><button class="btn secondary" onclick="showPanel('book')">📖 図鑑を見る</button></div>
</section>
<section id="discover" class="panel">
 <div class="box"><h2>📷 新しい発見</h2><div id="preview" class="photoBox">写真を選んでね</div>
 <div class="row" style="margin-top:9px"><label class="btn primary filebtn">📷 カメラ<input id="cameraInput" type="file" accept="image/*" capture="environment"></label><label class="btn secondary filebtn">🖼️ 写真<input id="libraryInput" type="file" accept="image/*"></label></div>
 <button id="aiBtn" class="btn ghost full" style="margin-top:10px" onclick="judgeAI()">🤖 AIで判定する</button><div id="aiResult" class="ai">AIは接続済みです。写真を選んで判定してね。</div>
 <label>生きものの名前</label><input id="nameInput" placeholder="AI結果または手入力">
 <label>発見した場所</label><input id="placeInput" placeholder="例：自宅の近くの公園">
 <label>メモ</label><textarea id="memoInput"></textarea>
 <button class="btn primary full" style="margin-top:10px" onclick="saveDiscovery()">カードをゲットする</button></div>
</section>
<section id="book" class="panel">
 <div class="box"><h2>📖 カード図鑑</h2><div class="stats"><b id="foundStat"></b><b id="cardStat"></b><b id="rateStat"></b></div><div class="progress"><i id="bookBar"></i></div></div>
 <div class="toolbar"><input id="searchInput" placeholder="名前・分類で検索"><select id="filterInput"><option value="">すべて</option><option>昆虫</option><option>魚類</option><option>鳥類</option><option>植物</option><option>両生類</option><option>爬虫類</option><option>哺乳類</option></select></div>
 <div id="bookGrid" class="grid"></div>
</section>
<section id="spirit" class="panel"><div class="box"><h2>✨ 精霊・称号</h2><div id="spiritPage"></div></div></section>
<section id="friends" class="panel"><div class="box"><h2>👥 フレンド</h2><p class="small">お気に入りカードまたは最高レアカード、称号、精霊の姿を表示。</p><div id="friendList"></div><button class="btn secondary full" onclick="addDemoFriend()">＋ フレンドを追加（試作）</button></div></section>
<section id="settings" class="panel"><div class="box"><h2>⚙️ 設定</h2><label>プレイヤー名</label><input id="playerName"><label>AI接続先</label><input id="workerInput"><button class="btn primary full" style="margin-top:10px" onclick="saveSettings()">保存</button><button class="btn ghost full" style="margin-top:8px" onclick="testAI()">AI接続テスト</button><p id="testResult" class="small"></p></div></section>
</main>
<nav class="bottom">
<button data-p="home" class="active" onclick="showPanel('home')"><i>🏠</i>ホーム</button>
<button data-p="discover" onclick="showPanel('discover')"><i>📷</i>発見</button>
<button data-p="book" onclick="showPanel('book')"><i>📖</i>図鑑</button>
<button data-p="spirit" onclick="showPanel('spirit')"><i>✨</i>精霊</button>
<button data-p="friends" onclick="showPanel('friends')"><i>👥</i>フレンド</button>
</nav>
<div id="modal" class="modal"><div class="modalcard"><button class="close" onclick="closeModal()">×</button><div id="modalBody"></div></div></div>
<div id="getfx" class="getfx"><div><h2>カードGET！</h2><div id="getCard"></div><button class="btn primary" onclick="closeGet()">図鑑にしまう</button></div></div>
<div id="toast" class="toast"></div>
<script src="./config.js"></script><script src="./catalog.js"></script>
<script>
const KEY='ikimono_master_v4'; const AI_DEFAULT=window.IKIMONO_CONFIG?.AI_WORKER_URL||'';
const base={playerName:'雅',discoveries:[],spirit:{hatched:false,name:'',selectedStage:'base'},friends:[],aiWorkerUrl:AI_DEFAULT,trades:[]};
let state=load(), currentImage='';
function load(){try{let s={...structuredClone(base),...JSON.parse(localStorage.getItem(KEY)||'{}')};if(!s.aiWorkerUrl)s.aiWorkerUrl=AI_DEFAULT;return s}catch{return structuredClone(base)}}
function persist(){localStorage.setItem(KEY,JSON.stringify(state))}
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const norm=s=>String(s||'').replace(/[ぁ-ん]/g,c=>String.fromCharCode(c.charCodeAt(0)+0x60)).replace(/[\s・ー\-]/g,'').toLowerCase();
const byName=n=>IKIMONO_CATALOG.find(x=>norm(x.name)===norm(n))||IKIMONO_CATALOG.find(x=>x.name&&norm(n).includes(norm(x.name)))||null;
const unique=()=>new Map(state.discoveries.map(d=>[norm(d.name),d]));
const copies=n=>state.discoveries.filter(d=>norm(d.name)===norm(n)).length;
const rank=r=>['','N','R','SR','SSR','UR'][Math.max(1,Math.min(5,Number(r)||1))];
const colors=r=>[{rar:'#9aa39d',bg1:'#3b4440',bg2:'#111713'},{rar:'#6ed06e',bg1:'#275c2e',bg2:'#0d2714'},{rar:'#59b9ed',bg1:'#1c5e7e',bg2:'#082738'},{rar:'#cf74ef',bg1:'#63267a',bg2:'#24102c'},{rar:'#ffd24f',bg1:'#9a6a08',bg2:'#3c2600'},{rar:'#ff8ddb',bg1:'#6e34a1',bg2:'#14377a'}][Math.max(1,Math.min(5,Number(r)||1))];
const emoji=c=>({'昆虫':'🪲','魚類':'🐟','鳥類':'🐦','植物':'🌿','両生類':'🐸','爬虫類':'🦎','哺乳類':'🦊'}[c]||'🌱');
function showPanel(id){document.querySelectorAll('.panel').forEach(x=>x.classList.toggle('active',x.id===id));document.querySelectorAll('.bottom button').forEach(x=>x.classList.toggle('active',x.dataset.p===id));renderAll();scrollTo(0,0)}
function official(x,dim=false){return `<img src="${esc(x.image)}" alt="" class="${dim?'dim':''}" onerror="this.remove();this.parentElement.innerHTML='<div class=fallback>${emoji(x.category)}</div>'">`}
function card(x,d,mini=false){let c=colors(x.rarity),cnt=copies(x.name),who=d?.discoverer||state.playerName;return `<div class="cardface ${mini?'mini':''}" style="--rar:${c.rar};--bg1:${c.bg1};--bg2:${c.bg2}"><div class="rank">${rank(x.rarity)}</div><div class="art">${emoji(x.category)}</div><div class="cardname">${esc(x.name)}</div><div class="stars">${'★'.repeat(x.rarity)}${'☆'.repeat(5-x.rarity)}</div><div class="cardmeta"><span>発見者：${esc(who)}</span><b>×${cnt||1}</b></div></div>`}
function renderBook(){let q=norm(searchInput.value),f=filterInput.value,u=unique();let list=IKIMONO_CATALOG.filter(x=>(!q||norm(x.name+x.category).includes(q))&&(!f||x.category===f));bookGrid.innerHTML=list.map(x=>{let d=u.get(norm(x.name)),found=!!d&&!!x.name;if(found)return `<article class="slot" onclick="openDetail(${x.no})"><span class=no>No.${String(x.no).padStart(3,'0')}</span>${card(x,d)}</article>`;return `<article class="slot locked" onclick="lockedMsg()"><span class=no>No.${String(x.no).padStart(3,'0')}</span><div class=photo>${official(x,true)}</div><div class=slotbody><h3>？？？</h3><span class=small>${esc(x.category==='未設定'?'準備中':x.category)}</span><br><span class=lock>🔒 未発見</span></div></article>`}).join('');let n=u.size,c=state.discoveries.length;foundStat.textContent=`発見 ${n}/500種類`;cardStat.textContent=`カード ${c}枚`;rateStat.textContent=`完成率 ${(n/5).toFixed(1)}%`;bookBar.style.width=(n/5)+'%'}
searchInput.oninput=renderBook;filterInput.onchange=renderBook;
function openDetail(no){let x=IKIMONO_CATALOG.find(a=>a.no===no),d=unique().get(norm(x.name));if(!d)return;modalBody.innerHTML=`<h2>No.${String(no).padStart(3,'0')} ${esc(x.name)}</h2><div class=detailgrid>${card(x,d)}<div class=detail><div class=tabs><button class="btn secondary" onclick="showDetailTab('info')">図鑑情報</button><button class="btn ghost" onclick="showDetailTab('photos')">写真</button></div><div id=infoTab><h4>分類</h4>${esc(x.category)}<h4>見つかる場所</h4>${esc(x.habitat)}<h4>見つかる季節</h4>${esc(x.season)}<h4>大きさ</h4>${esc(x.size)}<h4>説明</h4>${esc(x.description)}<h4>記録</h4>初発見：${new Date(d.date).toLocaleDateString('ja-JP')}<br>保有枚数：${copies(x.name)}枚<br>発見者：${esc(d.discoverer||state.playerName)}</div><div id=photoTab style="display:none"><h4>公式写真</h4><div class=photoBox>${official(x)}</div><h4>自分で撮った写真</h4><div class=photoBox>${d.image?`<img src="${d.image}">`:'写真なし'}</div></div></div></div><button class="btn primary full" style="margin-top:12px" onclick="toggleFavorite('${esc(x.name)}')">${d.favorite?'★ お気に入り解除':'☆ お気に入り登録'}</button>`;modal.classList.add('show')}
function showDetailTab(t){infoTab.style.display=t==='info'?'block':'none';photoTab.style.display=t==='photos'?'block':'none'}
function closeModal(){modal.classList.remove('show')}function lockedMsg(){toast('まだ見つけていない生きものだよ')}
function toggleFavorite(n){state.discoveries.filter(d=>norm(d.name)===norm(n)).forEach(d=>d.favorite=!d.favorite);persist();closeModal();renderAll()}
function bindFile(id){document.getElementById(id).onchange=e=>{let f=e.target.files?.[0];if(!f)return;let r=new FileReader;r.onload=()=>{currentImage=r.result;preview.innerHTML=`<img src="${currentImage}">`};r.readAsDataURL(f)}}
bindFile('cameraInput');bindFile('libraryInput');
async function judgeAI(){if(!currentImage)return toast('先に写真を選んでね');let url=state.aiWorkerUrl||AI_DEFAULT;aiBtn.disabled=true;aiBtn.textContent='判定中…';aiResult.textContent='AIが写真を調べています…';try{let r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({imageBase64:currentImage})});let raw=await r.json();if(!r.ok||raw.error)throw new Error(raw.error||'AIエラー');let data=raw;if(raw.candidates?.[0]?.content){let t=raw.candidates[0].content.parts?.[0]?.text||'';data=JSON.parse(t.replace(/```json|```/g,'').trim())}let arr=Array.isArray(data.candidates)?data.candidates:[data];aiResult.innerHTML='<b>近いものを選んでね</b>'+arr.slice(0,3).map((c,i)=>`<button class=candidate onclick='chooseCandidate(${JSON.stringify(JSON.stringify(c))})'><b>${i+1}. ${esc(c.name||'不明')}</b>　${Math.round((Number(c.confidence)||0)*(Number(c.confidence)<=1?100:1))}%<br><span class=small>${esc(c.description||'')}</span></button>`).join('')}catch(e){aiResult.innerHTML=`判定できませんでした。<br><span class=small>${esc(e.message)}。手入力でも登録できます。</span>`}finally{aiBtn.disabled=false;aiBtn.textContent='🤖 AIで判定する'}}
function chooseCandidate(s){let c=JSON.parse(s);nameInput.value=c.name||'';aiResult.innerHTML=`選択：<b>${esc(c.name||'')}</b>`}
function saveDiscovery(){let n=nameInput.value.trim();if(!n)return toast('名前を入れてね');let x=byName(n);if(!x)return toast('固定500種の図鑑にまだ登録されていない名前です');let first=!unique().has(norm(x.name));let d={id:Date.now(),name:x.name,category:x.category,image:currentImage,place:placeInput.value.trim(),memo:memoInput.value.trim(),date:new Date().toISOString(),discoverer:state.playerName,favorite:false};state.discoveries.push(d);persist();getCard.innerHTML=card(x,d);getfx.classList.add('show');resetDiscovery();renderAll()}
function resetDiscovery(){currentImage='';preview.textContent='写真を選んでね';nameInput.value=placeInput.value=memoInput.value='';cameraInput.value=libraryInput.value=''}
function closeGet(){getfx.classList.remove('show');showPanel('book')}
function spiritInfo(){let n=unique().size,stage=n<3?'卵':n<10?'羽化':n<30?'のこ':n<60?'ぬし':n<100?'精霊':n<150?'精霊王':'神獣';let form=n<3?'🥚':n<10?'🐣':n<30?'🌱':n<60?'🦊':n<100?'🧚':n<150?'👑':'🐉';return {n,stage,form}}
function renderSpirit(){let s=spiritInfo(),pct=Math.min(100,s.n/3*100);spiritArt.textContent=s.form;spiritTitle.textContent=s.stage==='卵'?'不思議な卵':`${s.stage}の精霊`;spiritSub.textContent=s.n<3?`羽化まであと${3-s.n}種類`:`発見 ${s.n}種類`;spiritBar.style.width=pct+'%';spiritPage.innerHTML=`<div style="text-align:center;font-size:100px">${s.form}</div><h3 style="text-align:center">${s.stage}</h3><p>前に決めた進化ルール：</p><p class=small>3種類で羽化 → のこ10種類 → ぬし30種類 → 精霊60種類 → 精霊王100種類 → 神獣150種類</p><button class="btn secondary full" onclick="toast('獲得した称号と姿を変更できる画面を実装済みの土台です')">精霊の称号と姿</button>`}
function bestCard(ds){let found=ds.map(d=>({d,x:byName(d.name)})).filter(a=>a.x);let fav=found.find(a=>a.d.favorite);return fav||found.sort((a,b)=>b.x.rarity-a.x.rarity)[0]}
function renderFriends(){friendList.innerHTML=state.friends.length?state.friends.map(f=>{let b=f.cardNo?IKIMONO_CATALOG.find(x=>x.no===f.cardNo):IKIMONO_CATALOG[22];return `<div class=friend><div class=avatar>${f.avatar||'🙂'}</div><div><b>${esc(f.name)}</b><div class=small>図鑑 ${f.found||0}/500</div><div class=small>称号：${esc(f.title||'たまご')}</div><div class=small>精霊：${f.spirit||'🥚'}</div></div>${card(b,{discoverer:f.name},true)}</div>`}).join(''):'<p class=small>まだフレンドはいません。</p>'}
function addDemoFriend(){let names=['けんた','さくら','ゆうと','はると'];let i=state.friends.length;if(i>=10)return toast('フレンドは最大10人');state.friends.push({name:names[i%4],avatar:['👦','👧','🧒','👦'][i%4],found:Math.floor(60+Math.random()*260),title:['森の守護者','水の精霊','昆虫のぬし','大地の子'][i%4],spirit:['🦌','🧚','🪲','🐺'][i%4],cardNo:[23,29,5,28][i%4]});persist();renderFriends()}
function saveSettings(){state.playerName=playerName.value.trim()||'雅';state.aiWorkerUrl=workerInput.value.trim()||AI_DEFAULT;persist();toast('保存したよ')}
async function testAI(){try{let r=await fetch(state.aiWorkerUrl||AI_DEFAULT);let j=await r.json();testResult.textContent=j.success?'AI接続OK！':'AI側の設定を確認してください'}catch{testResult.textContent='AIに接続できませんでした'}}
function renderAll(){renderBook();renderSpirit();renderFriends();playerName.value=state.playerName;workerInput.value=state.aiWorkerUrl||AI_DEFAULT}
function toast(t){toastEl=document.getElementById('toast');toastEl.textContent=t;toastEl.classList.add('show');setTimeout(()=>toastEl.classList.remove('show'),1900)}
