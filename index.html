<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0b6b3a"><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="styles.css"><title>いきものマスター</title></head><body><header><div><small>NATURE CARD ADVENTURE</small><h1>いきものマスター</h1></div><b><span id="ownedCount">0</span>/500</b></header><main><section id="home" class="screen active"><div class="hero"><div>🍀</div><h2>きょうは何を見つける？</h2><p>写真を撮って、生き物カードを集めよう。</p><button data-go="scan">📷 さがす</button></div><div class="menu"><button data-go="book">📖<b>図鑑</b></button><button data-go="spirit">🐉<b>スピリット</b></button><button data-go="mission">🎯<b>ミッション</b></button><button data-go="settings">⚙️<b>設定</b></button></div></section><section id="scan" class="screen"><h2>← いきものを発見</h2><div class="panel"><input id="photo" type="file" accept="image/*" capture="environment"><div id="preview">📷</div><select id="pick"></select><button id="identify">この生き物で判定</button></div></section><section id="book" class="screen"><h2>← カード図鑑</h2><div class="tools"><input id="search" placeholder="名前・番号で検索"><select id="filter"><option value="all">すべて</option><option value="owned">発見済み</option><option value="locked">未発見</option></select></div><div id="grid"></div></section><section id="detail" class="screen"><h2>← カード詳細</h2><div id="detailBody"></div></section><section id="spirit" class="screen"><h2>← スピリット</h2><div class="panel center"><div class="giant">🐉</div><h3>木霊スピリット</h3><p>発見したカードの属性で成長します。</p></div></section><section id="mission" class="screen"><h2>← ミッション</h2><div class="panel">今日の発見：生き物を1種類見つけよう</div></section><section id="settings" class="screen"><h2>← 設定</h2><button id="reset">発見データを初期化</button></section></main><div id="overlay" class="hidden"><div><h2>CARD GET!!</h2><div id="getCard"></div><button id="closeGet">図鑑を見る</button></div></div><nav><button data-go="home">🏠<span>ホーム</span></button><button data-go="scan">📷<span>さがす</span></button><button data-go="book">📖<span>図鑑</span></button><button data-go="spirit">🐉<span>育成</span></button></nav><script src="data.js"></script><script src="app.js"></script></body></html>
